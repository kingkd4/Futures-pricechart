<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Futures P&L Calculator</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<!-- For browser tab icon -->
<link rel="icon" href="IMG_5416.jpeg" type="image/x-icon">

<!-- For Apple devices (Add to Home Screen) -->
<link rel="apple-touch-icon" href="IMG_5416.jpeg">

<!-- Optional: For Android Chrome -->
<link rel="manifest" href="manifest.json">
  <style>
  :root {
    --bg:         #EEF6F5;
    --surface:    #E4F2F0;
    --surface2:   #D6EBE8;
    --teal:       #4A9E96;
    --teal-light: #74BDB7;
    --teal-muted: #C2DFDD;
    --sky:        #7BBCD4;
    --sky-muted:  #D0EAF5;
    --ink:        #1C3A36;
    --ink-soft:   #2E5C55;
    --ink-mid:    #3D6B62;
    --ink-faint:  #5A877F;
    --border:     #7BBCB5;
    --white:      #F4FAFA;
  }

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
background: var(–bg);
font-family: ‘DM Sans’, sans-serif;
color: var(–ink);
min-height: 100vh;
padding: 0 0 60px;
-webkit-text-size-adjust: 100%;
}

/* ── BUTTONS RESET ── */
button {
-webkit-appearance: none;
appearance: none;
border: none;
background: none;
font: inherit;
cursor: pointer;
outline: none;
-webkit-tap-highlight-color: transparent;
touch-action: manipulation;
}

/* ── HEADER ── */
header {
background: linear-gradient(135deg, #5BBFB5 0%, #4AAEC8 50%, #5BA8D8 100%);
padding: 36px 24px 28px;
text-align: center;
position: relative;
overflow: hidden;
}
header::before {
content: ‘’;
position: absolute;
top: -30px; right: -30px;
width: 120px; height: 120px;
border-radius: 50%;
background: rgba(255,255,255,0.15);
}
header::after {
content: ‘’;
position: absolute;
bottom: -20px; left: -20px;
width: 90px; height: 90px;
border-radius: 50%;
background: rgba(255,255,255,0.10);
}
header h1 {
font-family: ‘Cormorant Garamond’, serif;
font-weight: 300;
font-size: 2.2rem;
letter-spacing: 0.05em;
color: #fff;
position: relative;
z-index: 1;
}
header p {
font-size: 0.7rem;
letter-spacing: 0.2em;
text-transform: uppercase;
color: rgba(255,255,255,0.85);
margin-top: 6px;
position: relative;
z-index: 1;
}

/* ── TABS ── */
.symbol-tabs {
display: flex;
background: var(–surface);
border-bottom: 1px solid var(–border);
}
.tab-btn {
flex: 1;
padding: 14px 8px 12px;
font-family: ‘Cormorant Garamond’, serif;
font-size: 1.2rem;
font-weight: 400;
color: var(–ink-faint);
background: transparent;
border-bottom: 2px solid transparent;
margin-bottom: -2px;
text-align: center;
transition: color 0.2s, border-color 0.2s, background 0.2s;
}
.tab-btn.active {
color: var(–teal);
border-bottom-color: var(–teal);
background: var(–bg);
font-weight: 500;
}
.tick-val {
display: block;
font-family: ‘DM Sans’, sans-serif;
font-size: 0.58rem;
letter-spacing: 0.1em;
text-transform: uppercase;
color: var(–ink-faint);
margin-top: 2px;
}
.tab-btn.active .tick-val { color: var(–teal); }

/* ── MAIN ── */
main { padding: 20px 18px; }

/* ── SYMBOL CARD ── */
.symbol-card {
background: linear-gradient(135deg, #5BBFB5 0%, #4AAEC8 60%, #5BA8D8 100%);
border-radius: 16px;
padding: 20px 22px;
margin-bottom: 22px;
display: flex;
justify-content: space-between;
align-items: center;
box-shadow: 0 4px 20px rgba(74,158,150,0.35);
position: relative;
overflow: hidden;
}
.symbol-card::after {
content: ‘’;
position: absolute;
top: -20px; right: -20px;
width: 80px; height: 80px;
border-radius: 50%;
background: rgba(255,255,255,0.12);
}
.sym-name {
font-family: ‘Cormorant Garamond’, serif;
font-size: 2.2rem;
font-weight: 400;
color: #fff;
letter-spacing: 0.03em;
}
.sym-desc {
font-size: 0.65rem;
color: rgba(255,255,255,0.85);
text-transform: uppercase;
letter-spacing: 0.13em;
margin-top: 3px;
}
.tick-badge { text-align: right; position: relative; z-index: 1; }
.tick-label {
font-size: 0.6rem;
text-transform: uppercase;
letter-spacing: 0.12em;
color: rgba(255,255,255,0.8);
}
.tick-num {
font-family: ‘Cormorant Garamond’, serif;
font-size: 1.8rem;
font-weight: 400;
color: #fff;
}
.tick-num span { font-size: 1rem; }

/* ── INPUT GROUPS ── */
.input-group { margin-bottom: 20px; }
.input-label {
font-size: 0.67rem;
text-transform: uppercase;
letter-spacing: 0.15em;
color: var(–ink-mid);
margin-bottom: 10px;
display: block;
font-weight: 500;
}

/* ── CONTROL ROW ── */
.control-row {
display: flex;
align-items: center;
gap: 10px;
}

/* +/- buttons — fully explicit styles, high contrast */
.pm-btn {
width: 38px;
height: 38px;
min-width: 38px;
border-radius: 50%;
border: 1px solid var(–teal) !important;
background: var(–white) !important;
color: var(–teal) !important;
font-size: 1.3rem;
font-weight: 300;
display: flex;
align-items: center;
justify-content: center;
flex-shrink: 0;
user-select: none;
-webkit-tap-highlight-color: transparent;
touch-action: manipulation;
transition: background 0.15s, transform 0.1s;
/* Override Safari system button */
-webkit-appearance: none !important;
line-height: 1;
}
.pm-btn:active {
transform: scale(0.88);
background: var(–teal-muted) !important;
}

/* ── CUSTOM SLIDER (div-based, 100% iOS safe) ── */
.slider-wrap {
flex: 1;
position: relative;
height: 38px;
display: flex;
align-items: center;
cursor: pointer;
touch-action: none;
}
.slider-track {
width: 100%;
height: 5px;
border-radius: 5px;
background: var(–surface2);
border: 1px solid var(–border);
position: relative;
overflow: visible;
}
.slider-fill {
height: 100%;
border-radius: 5px;
background: linear-gradient(90deg, var(–teal), var(–sky));
position: absolute;
top: 0; left: 0;
pointer-events: none;
}
.slider-thumb {
width: 28px;
height: 28px;
border-radius: 50%;
background: linear-gradient(135deg, var(–teal-light), var(–sky));
border: 3px solid #fff;
box-shadow: 0 2px 8px rgba(74,158,150,0.5), 0 0 0 2px var(–teal);
position: absolute;
top: 50%;
transform: translate(-50%, -50%);
pointer-events: none;
transition: box-shadow 0.1s;
}

/* number box */
.number-input {
width: 70px;
height: 38px;
border: 1px solid var(–border);
border-radius: 10px;
background: var(–white);
padding: 0 8px;
font-family: ‘Cormorant Garamond’, serif;
font-size: 1.2rem;
color: var(–ink);
text-align: center;
outline: none;
-webkit-appearance: none;
appearance: none;
-webkit-tap-highlight-color: transparent;
touch-action: manipulation;
}
.number-input:focus {
border-color: var(–teal);
box-shadow: 0 0 0 2px var(–teal-muted);
}

/* ── RESULTS ── */
.results-grid {
display: grid;
grid-template-columns: 1fr 1fr;
gap: 10px;
margin-top: 22px;
}
.result-card {
background: var(–white);
border: 1px solid var(–border);
border-radius: 14px;
padding: 14px 16px;
}
.result-card.highlight {
background: linear-gradient(135deg, #5BBFB5 0%, #4AAEC8 60%, #5BA8D8 100%);
border-color: transparent;
grid-column: 1 / -1;
box-shadow: 0 4px 18px rgba(74,158,150,0.4);
}
.rc-label {
font-size: 0.62rem;
text-transform: uppercase;
letter-spacing: 0.13em;
color: var(–ink-mid);
font-weight: 500;
}
.highlight .rc-label { color: rgba(255,255,255,0.85); }
.rc-value {
font-family: ‘Cormorant Garamond’, serif;
font-size: 2rem;
font-weight: 300;
color: var(–ink);
margin-top: 3px;
}
.highlight .rc-value { font-size: 2.6rem; color: #fff; }
.rc-sub {
font-size: 0.63rem;
color: var(–ink-mid);
margin-top: 3px;
}
.highlight .rc-sub { color: rgba(255,255,255,0.8); }

/* ── DIVIDER ── */
.divider {
height: 1px;
background: linear-gradient(90deg, transparent, var(–border), transparent);
margin: 26px 0;
}

/* ── TABLE ── */
.ref-title {
font-family: ‘Cormorant Garamond’, serif;
font-size: 1.05rem;
font-style: italic;
letter-spacing: 0.06em;
color: var(–ink-soft);
margin-bottom: 10px;
padding-bottom: 7px;
border-bottom: 1px solid var(–border);
}
.ref-table {
width: 100%;
border-collapse: collapse;
overflow: hidden;
border-radius: 10px;
border: 1px solid var(–border);
}
.ref-table th {
font-size: 0.6rem;
text-transform: uppercase;
letter-spacing: 0.1em;
color: var(–ink-soft);
font-weight: 600;
padding: 8px 10px;
text-align: left;
background: var(–surface2);
border: 1px solid var(–border);
}
.ref-table td {
padding: 9px 10px;
font-size: 0.85rem;
border: 1px solid var(–border);
color: var(–ink);
}
.ref-table tr:nth-child(even) td { background: var(–surface); }
.ref-table tr:nth-child(odd)  td { background: var(–white); }
.pts-col    { color: var(–ink-soft); font-size: 0.82rem; font-weight: 500; }
.dollar-col { font-family: ‘Cormorant Garamond’, serif; font-size: 1rem; color: var(–ink-soft); }
</style>

</head>
<body>

<header>
  <h1>Futures P&L</h1>
  <p>Points · Contracts · Dollars</p>
</header>

<div class="symbol-tabs">
  <button class="tab-btn active" id="tab-MNQ" onclick="setSymbol('MNQ')">MNQ<span class="tick-val">$2 / pt</span></button>
  <button class="tab-btn"        id="tab-MES" onclick="setSymbol('MES')">MES<span class="tick-val">$5 / pt</span></button>
  <button class="tab-btn"        id="tab-MGC" onclick="setSymbol('MGC')">MGC<span class="tick-val">$10 / pt</span></button>
</div>

<main>

  <div class="symbol-card">
    <div>
      <div class="sym-name" id="card-symbol">MNQ</div>
      <div class="sym-desc"  id="card-desc">Micro Nasdaq-100</div>
    </div>
    <div class="tick-badge">
      <div class="tick-label">Tick Value</div>
      <div class="tick-num"  id="card-tick">$2<span>/pt</span></div>
    </div>
  </div>

  <!-- CONTRACTS -->

  <div class="input-group">
    <label class="input-label">Contracts</label>
    <div class="control-row">
      <button class="pm-btn" id="contracts-minus">−</button>
      <div class="slider-wrap" id="contracts-slider-wrap">
        <div class="slider-track">
          <div class="slider-fill"  id="contracts-fill"></div>
          <div class="slider-thumb" id="contracts-thumb"></div>
        </div>
      </div>
      <button class="pm-btn" id="contracts-plus">+</button>
      <input  type="number" class="number-input" id="contracts-input" min="1" max="99" value="1">
    </div>
  </div>

  <!-- POINTS -->

  <div class="input-group">
    <label class="input-label">Points</label>
    <div class="control-row">
      <button class="pm-btn" id="points-minus">−</button>
      <div class="slider-wrap" id="points-slider-wrap">
        <div class="slider-track">
          <div class="slider-fill"  id="points-fill"></div>
          <div class="slider-thumb" id="points-thumb"></div>
        </div>
      </div>
      <button class="pm-btn" id="points-plus">+</button>
      <input  type="number" class="number-input" id="points-input" min="0.25" max="9999" step="0.25" value="15">
    </div>
  </div>

  <!-- RESULTS -->

  <div class="results-grid">
    <div class="result-card highlight">
      <div class="rc-label">Total P&amp;L</div>
      <div class="rc-value" id="result-dollar">$30.00</div>
      <div class="rc-sub"   id="result-sub">1 contract · 15 pts · MNQ</div>
    </div>
    <div class="result-card">
      <div class="rc-label">Per Contract</div>
      <div class="rc-value" id="result-per-contract">$30.00</div>
      <div class="rc-sub">single contract value</div>
    </div>
    <div class="result-card">
      <div class="rc-label">Per Point</div>
      <div class="rc-value" id="result-per-point">$2.00</div>
      <div class="rc-sub"   id="result-tick-sub">tick × contracts</div>
    </div>
  </div>

  <div class="divider"></div>

  <div>
    <div class="ref-title">Quick Reference — <span id="ref-sym-label">MNQ</span></div>
    <table class="ref-table">
      <thead>
        <tr><th>Points</th><th>1 Contract</th><th>2 Contracts</th><th>5 Contracts</th></tr>
      </thead>
      <tbody id="ref-tbody"></tbody>
    </table>
  </div>

</main>

<script>
  const SYMBOLS = {
    MNQ: { name:'MNQ', desc:'Micro Nasdaq-100',      tickValue:2  },
    MES: { name:'MES', desc:'Micro E-mini S&P 500',  tickValue:5  },
    MGC: { name:'MGC', desc:'Micro Gold',             tickValue:10 },
  };
  const REF_POINTS = [5,10,15,20,25,30,50,100];

  // Slider configs
  const SLIDER_CONFIG = {
    contracts: { min:1,    max:20,  step:1,    defVal:1  },
    points:    { min:0.25, max:200, step:0.25, defVal:15 },
  };

  let currentSymbol = 'MNQ';
  let contracts = 1;
  let points    = 15;

  // ── Custom slider logic ──
  function makeSlider(name) {
    const cfg   = SLIDER_CONFIG[name];
    const wrap  = document.getElementById(`${name}-slider-wrap`);
    const fill  = document.getElementById(`${name}-fill`);
    const thumb = document.getElementById(`${name}-thumb`);
    const input = document.getElementById(`${name}-input`);

    function pct(val) {
      return (val - cfg.min) / (cfg.max - cfg.min);
    }
    function updateUI(val) {
      const p = pct(val) * 100;
      fill.style.width  = p + '%';
      thumb.style.left  = p + '%';
    }
    function clamp(val) {
      const steps = Math.round((val - cfg.min) / cfg.step);
      return Math.max(cfg.min, Math.min(cfg.max, cfg.min + steps * cfg.step));
    }
    function valFromEvent(e) {
      const rect = wrap.getBoundingClientRect();
      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      const ratio = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
      return clamp(cfg.min + ratio * (cfg.max - cfg.min));
    }
    function set(val, updateInput) {
      val = clamp(val);
      if (name === 'contracts') contracts = val;
      else                      points    = val;
      updateUI(val);
      if (updateInput) input.value = val;
      recalc();
    }

    // Touch / mouse events on the slider wrap
    function onStart(e) {
      e.preventDefault();
      set(valFromEvent(e), true);
      const onMove = ev => { ev.preventDefault(); set(valFromEvent(ev), true); };
      const onEnd  = ()  => { document.removeEventListener('mousemove', onMove); document.removeEventListener('mouseup', onEnd); document.removeEventListener('touchmove', onMove); document.removeEventListener('touchend', onEnd); };
      document.addEventListener('mousemove', onMove, {passive:false});
      document.addEventListener('mouseup',   onEnd);
      document.addEventListener('touchmove', onMove, {passive:false});
      document.addEventListener('touchend',  onEnd);
    }
    wrap.addEventListener('mousedown',  onStart, {passive:false});
    wrap.addEventListener('touchstart', onStart, {passive:false});

    // Number input
    input.addEventListener('input', () => {
      const v = parseFloat(input.value);
      if (!isNaN(v)) set(v, false);
    });
    input.addEventListener('change', () => {
      const v = clamp(parseFloat(input.value) || cfg.min);
      set(v, true);
    });

    // +/- buttons
    document.getElementById(`${name}-minus`).addEventListener('click', () => {
      const cur = name==='contracts' ? contracts : points;
      set(cur - cfg.step, true);
    });
    document.getElementById(`${name}-plus`).addEventListener('click', () => {
      const cur = name==='contracts' ? contracts : points;
      set(cur + cfg.step, true);
    });

    // Init
    updateUI(name==='contracts' ? contracts : points);
  }

  function setSymbol(sym) {
    currentSymbol = sym;
    ['MNQ','MES','MGC'].forEach(s => {
      document.getElementById(`tab-${s}`).classList.toggle('active', s===sym);
    });
    const s = SYMBOLS[sym];
    document.getElementById('card-symbol').textContent = s.name;
    document.getElementById('card-desc').textContent   = s.desc;
    document.getElementById('card-tick').innerHTML     = `$${s.tickValue}<span>/pt</span>`;
    recalc();
    buildRefTable();
  }

  function fmt(n) {
    return '$' + n.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
  }

  function recalc() {
    const tick = SYMBOLS[currentSymbol].tickValue;
    document.getElementById('result-dollar').textContent       = fmt(tick * points * contracts);
    document.getElementById('result-per-contract').textContent = fmt(tick * points);
    document.getElementById('result-per-point').textContent    = fmt(tick * contracts);
    document.getElementById('result-sub').textContent          =
      `${contracts} contract${contracts>1?'s':''} · ${points} pts · ${currentSymbol}`;
    document.getElementById('result-tick-sub').textContent     =
      `$${tick} × ${contracts} contract${contracts>1?'s':''}`;
  }

  function buildRefTable() {
    const tick = SYMBOLS[currentSymbol].tickValue;
    document.getElementById('ref-sym-label').textContent = currentSymbol;
    document.getElementById('ref-tbody').innerHTML = REF_POINTS.map(p => `
      <tr>
        <td class="pts-col">${p} pts</td>
        <td class="dollar-col">${fmt(tick*p)}</td>
        <td class="dollar-col">${fmt(tick*p*2)}</td>
        <td class="dollar-col">${fmt(tick*p*5)}</td>
      </tr>`).join('');
  }

  // Init
  makeSlider('contracts');
  makeSlider('points');
  setSymbol('MNQ');
</script>

</body>
</html>
