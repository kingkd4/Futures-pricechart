<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Futures P&L</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>

/* ── RESET ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
button { font-family: inherit; cursor: pointer; }
input  { font-family: inherit; }

/* ── TOKENS ── */
:root {
–bg:        #ECF5F4;
–surface:   #E0EFED;
–surface2:  #D2E8E5;
–border:    #B4D4CF;
–teal-1:    #A2DDD6;
–teal-2:    #78C9C0;
–teal-3:    #4EADA4;
–sky-1:     #A0D4E8;
–sky-2:     #78BCE0;
–sage-1:    #A4D9BE;
–ink-0:     #0F2926;
–ink-1:     #1E3C38;
–ink-2:     #2E5550;
–ink-3:     #3E6E68;
–ink-4:     #5A8880;
–card-bg:   #F8FEFE;
}

/* ── BASE ── */
body {
background-color: #ECF5F4;
font-family: ‘DM Sans’, sans-serif;
color: #1E3C38;
min-height: 100vh;
padding-bottom: 60px;
-webkit-font-smoothing: antialiased;
}

/* ── HEADER ── */
.header {
background-color: #9ED8D2;
padding: 36px 24px 28px;
text-align: center;
position: relative;
overflow: hidden;
}
.orb {
position: absolute;
border-radius: 50%;
background-color: rgba(255,255,255,0.16);
}
.orb-a { width: 110px; height: 110px; top: -34px; right: -26px; }
.orb-b { width: 70px;  height: 70px;  bottom: -20px; left: -18px; }
.orb-c { width: 50px;  height: 50px;  top: 10px; left: 30px; opacity: 0.5; }
.header h1 {
font-family: ‘Cormorant Garamond’, serif;
font-weight: 300;
font-size: 2.1rem;
letter-spacing: 0.04em;
color: #0F2926;
position: relative;
}
.header p {
font-size: 0.68rem;
letter-spacing: 0.2em;
text-transform: uppercase;
color: #2E5550;
margin-top: 6px;
font-weight: 400;
position: relative;
}

/* ── TABS ── */
.tabs {
display: -webkit-flex;
display: flex;
background-color: #E0EFED;
border-bottom: 1px solid #B4D4CF;
}
.tab {
-webkit-flex: 1;
flex: 1;
padding: 13px 8px 11px;
border: none;
border-bottom: 2px solid transparent;
background: transparent;
color: #5A8880;
font-family: ‘Cormorant Garamond’, serif;
font-size: 1.15rem;
font-weight: 400;
position: relative;
top: 1px;
}
.tab.active {
color: #1E3C38;
border-bottom-color: #4EADA4;
background-color: #ECF5F4;
}
.tab-sub {
display: block;
font-family: ‘DM Sans’, sans-serif;
font-size: 0.58rem;
letter-spacing: 0.1em;
text-transform: uppercase;
color: #5A8880;
margin-top: 2px;
font-weight: 400;
}
.tab.active .tab-sub { color: #4EADA4; }

/* ── MAIN ── */
main { padding: 20px 18px; }

/* ── SYMBOL CARD ── */
.sym-card {
background-color: #8ECFC8;
border-radius: 16px;
padding: 18px 20px;
margin-bottom: 22px;
display: -webkit-flex;
display: flex;
-webkit-justify-content: space-between;
justify-content: space-between;
-webkit-align-items: center;
align-items: center;
position: relative;
overflow: hidden;
box-shadow: 0 4px 20px rgba(78,173,164,0.2);
}
.card-orb {
position: absolute;
top: -22px; right: -22px;
width: 80px; height: 80px;
border-radius: 50%;
background-color: rgba(255,255,255,0.15);
}
.sym-name {
font-family: ‘Cormorant Garamond’, serif;
font-size: 2.2rem;
font-weight: 400;
color: #0F2926;
letter-spacing: 0.02em;
position: relative;
}
.sym-desc {
font-size: 0.66rem;
color: #2E5550;
text-transform: uppercase;
letter-spacing: 0.14em;
margin-top: 3px;
font-weight: 400;
position: relative;
}
.tick-badge { text-align: right; position: relative; }
.tick-label {
font-size: 0.6rem;
text-transform: uppercase;
letter-spacing: 0.13em;
color: #2E5550;
font-weight: 500;
}
.tick-num {
font-family: ‘Cormorant Garamond’, serif;
font-size: 1.7rem;
font-weight: 400;
color: #0F2926;
}
.tick-num span { font-size: 1rem; }

/* ── INPUT GROUPS ── */
.input-group { margin-bottom: 20px; }
.input-label {
display: block;
font-size: 0.65rem;
text-transform: uppercase;
letter-spacing: 0.16em;
color: #3E6E68;
margin-bottom: 9px;
font-weight: 500;
}

/* ── SLIDER ROW ── */
.slider-row {
display: -webkit-flex;
display: flex;
-webkit-align-items: center;
align-items: center;
gap: 10px;
}

/* ── +/- BUTTONS ── */
.pm-btn {
width: 32px;
height: 32px;
min-width: 32px;
border-radius: 50%;
border: 1.5px solid #B4D4CF;
background-color: #F8FEFE;
color: #2E5550;
font-size: 1.2rem;
line-height: 1;
display: -webkit-flex;
display: flex;
-webkit-align-items: center;
align-items: center;
-webkit-justify-content: center;
justify-content: center;
-webkit-flex-shrink: 0;
flex-shrink: 0;
-webkit-tap-highlight-color: transparent;
-webkit-user-select: none;
user-select: none;
}
.pm-btn:active {
background-color: #A2DDD6;
border-color: #78C9C0;
}

/* ── RANGE SLIDER — fully Safari-safe ── */
.range-wrap {
-webkit-flex: 1;
flex: 1;
position: relative;
height: 32px;
display: -webkit-flex;
display: flex;
-webkit-align-items: center;
align-items: center;
}

/* The track background uses a plain solid color — Safari handles this reliably */
input[type=“range”] {
-webkit-appearance: none;
appearance: none;
width: 100%;
height: 5px;
border-radius: 5px;
background-color: #D2E8E5;
outline: none;
cursor: pointer;
border: none;
padding: 0;
}

/* Safari / Chrome webkit thumb */
input[type=“range”]::-webkit-slider-container { }
input[type=“range”]::-webkit-slider-runnable-track {
height: 5px;
border-radius: 5px;
background-color: #D2E8E5;
}
input[type=“range”]::-webkit-slider-thumb {
-webkit-appearance: none;
appearance: none;
width: 26px;
height: 26px;
border-radius: 50%;
background-color: #78C9C0;
border: 3px solid #FFFFFF;
box-shadow: 0 1px 6px rgba(78,173,164,0.4);
cursor: pointer;
margin-top: -10px;
}

/* Firefox */
input[type=“range”]::-moz-range-track {
height: 5px;
border-radius: 5px;
background-color: #D2E8E5;
border: none;
}
input[type=“range”]::-moz-range-progress {
height: 5px;
border-radius: 5px;
background-color: #78C9C0;
}
input[type=“range”]::-moz-range-thumb {
width: 26px;
height: 26px;
border-radius: 50%;
background-color: #78C9C0;
border: 3px solid #FFFFFF;
box-shadow: 0 1px 6px rgba(78,173,164,0.4);
cursor: pointer;
}

/* ── NUMBER INPUT ── */
.num-input {
width: 74px;
border: 1.5px solid #B4D4CF;
border-radius: 10px;
background-color: #F8FEFE;
padding: 8px 6px;
font-family: ‘Cormorant Garamond’, serif;
font-size: 1.2rem;
color: #1E3C38;
text-align: center;
outline: none;
-webkit-appearance: none;
appearance: none;
}
.num-input:focus {
border-color: #78C9C0;
box-shadow: 0 0 0 3px rgba(120,201,192,0.22);
}
.num-input::-webkit-inner-spin-button,
.num-input::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
.num-input[type=“number”] { -moz-appearance: textfield; }

/* ── RESULTS ── */
.results-grid {
display: -webkit-flex;
display: flex;
-webkit-flex-wrap: wrap;
flex-wrap: wrap;
gap: 10px;
margin-top: 20px;
}
.result-card {
background-color: #F8FEFE;
border: 1.5px solid #B4D4CF;
border-radius: 14px;
padding: 15px 17px;
-webkit-flex: 1 1 calc(50% - 5px);
flex: 1 1 calc(50% - 5px);
min-width: 0;
}
.result-card.full {
-webkit-flex: 1 1 100%;
flex: 1 1 100%;
background-color: #90D4CE;
border-color: transparent;
box-shadow: 0 4px 20px rgba(78,173,164,0.18);
}
.rc-label {
font-size: 0.61rem;
text-transform: uppercase;
letter-spacing: 0.14em;
color: #3E6E68;
font-weight: 500;
}
.result-card.full .rc-label { color: #1E3C38; }
.rc-value {
font-family: ‘Cormorant Garamond’, serif;
font-size: 1.95rem;
font-weight: 400;
color: #1E3C38;
margin-top: 4px;
letter-spacing: 0.01em;
line-height: 1.1;
}
.result-card.full .rc-value {
font-size: 2.6rem;
color: #0F2926;
}
.rc-sub {
font-size: 0.62rem;
color: #3E6E68;
margin-top: 4px;
}
.result-card.full .rc-sub { color: #2E5550; }

/* ── DIVIDER ── */
.divider {
height: 1px;
background-color: #B4D4CF;
margin: 26px 0;
opacity: 0.7;
}

/* ── REF TABLE ── */
.ref-title {
font-family: ‘Cormorant Garamond’, serif;
font-size: 1.05rem;
font-style: italic;
font-weight: 400;
letter-spacing: 0.05em;
color: #2E5550;
margin-bottom: 11px;
padding-bottom: 8px;
border-bottom: 1px solid #B4D4CF;
}
.ref-table {
width: 100%;
border-collapse: collapse;
}
.ref-table th {
font-size: 0.6rem;
text-transform: uppercase;
letter-spacing: 0.12em;
color: #2E5550;
font-weight: 600;
padding: 9px 10px;
text-align: left;
background-color: #D2E8E5;
border: 1px solid #B4D4CF;
}
.ref-table td {
padding: 9px 10px;
font-size: 0.84rem;
border: 1px solid #B4D4CF;
color: #1E3C38;
}
.ref-table tr:nth-child(odd) td  { background-color: #F8FEFE; }
.ref-table tr:nth-child(even) td { background-color: #E0EFED; }
.pts-col  { color: #2E5550; font-size: 0.8rem; font-weight: 500; }
.dollar-col {
font-family: ‘Cormorant Garamond’, serif;
font-size: 1rem;
font-weight: 500;
color: #2E5550;
}

</style>
</head>
<body>

<header class="header">
  <div class="orb orb-a"></div>
  <div class="orb orb-b"></div>
  <div class="orb orb-c"></div>
  <h1>Futures P&amp;L</h1>
  <p>Points &middot; Contracts &middot; Dollars</p>
</header>

<div class="tabs">
  <button class="tab active" onclick="setSymbol('MNQ')">MNQ<span class="tab-sub">$2 / pt</span></button>
  <button class="tab"        onclick="setSymbol('MES')">MES<span class="tab-sub">$5 / pt</span></button>
  <button class="tab"        onclick="setSymbol('MGC')">MGC<span class="tab-sub">$10 / pt</span></button>
</div>

<main>

  <div class="sym-card">
    <div class="card-orb"></div>
    <div>
      <div class="sym-name" id="card-sym">MNQ</div>
      <div class="sym-desc" id="card-desc">Micro Nasdaq-100</div>
    </div>
    <div class="tick-badge">
      <div class="tick-label">Tick Value</div>
      <div class="tick-num" id="card-tick">$2<span>/pt</span></div>
    </div>
  </div>

  <div class="input-group">
    <label class="input-label">Contracts</label>
    <div class="slider-row">
      <button class="pm-btn" onclick="step('c',-1)">&#8722;</button>
      <div class="range-wrap">
        <input type="range" id="c-slider" min="1" max="20" value="1" oninput="onSlider('c',this.value)">
      </div>
      <button class="pm-btn" onclick="step('c',1)">+</button>
      <input type="number" class="num-input" id="c-input" min="1" max="99" value="1" oninput="onInput('c',this.value)">
    </div>
  </div>

  <div class="input-group">
    <label class="input-label">Points</label>
    <div class="slider-row">
      <button class="pm-btn" onclick="step('p',-0.25)">&#8722;</button>
      <div class="range-wrap">
        <input type="range" id="p-slider" min="0.25" max="200" step="0.25" value="15" oninput="onSlider('p',this.value)">
      </div>
      <button class="pm-btn" onclick="step('p',0.25)">+</button>
      <input type="number" class="num-input" id="p-input" min="0.25" max="9999" step="0.25" value="15" oninput="onInput('p',this.value)">
    </div>
  </div>

  <div class="results-grid">
    <div class="result-card full">
      <div class="rc-label">Total P&amp;L</div>
      <div class="rc-value" id="r-total">$30.00</div>
      <div class="rc-sub"   id="r-sub">1 contract &middot; 15 pts &middot; MNQ</div>
    </div>
    <div class="result-card">
      <div class="rc-label">Per Contract</div>
      <div class="rc-value" id="r-percon">$30.00</div>
      <div class="rc-sub">single contract value</div>
    </div>
    <div class="result-card">
      <div class="rc-label">Per Point</div>
      <div class="rc-value" id="r-perpt">$2.00</div>
      <div class="rc-sub"   id="r-ticksub">$2 &times; 1 contract</div>
    </div>
  </div>

  <div class="divider"></div>

  <div class="ref-title">Quick Reference &mdash; <span id="ref-sym">MNQ</span></div>
  <table class="ref-table">
    <thead>
      <tr>
        <th>Points</th><th>1 Contract</th><th>2 Contracts</th><th>5 Contracts</th>
      </tr>
    </thead>
    <tbody id="ref-body"></tbody>
  </table>

</main>

<script>
  var SYMS = {
    MNQ: { desc: 'Micro Nasdaq-100',      tick: 2  },
    MES: { desc: 'Micro E-mini S&P 500',  tick: 5  },
    MGC: { desc: 'Micro Gold',             tick: 10 }
  };
  var REF_PTS = [5,10,15,20,25,30,50,100];
  var sym = 'MNQ', contracts = 1, points = 15;

  function dollar(n) {
    return '$' + Math.abs(n).toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2});
  }

  function recalc() {
    var t = SYMS[sym].tick;
    document.getElementById('r-total').textContent  = dollar(t * points * contracts);
    document.getElementById('r-percon').textContent = dollar(t * points);
    document.getElementById('r-perpt').textContent  = dollar(t * contracts);
    document.getElementById('r-sub').textContent    =
      contracts + ' contract' + (contracts > 1 ? 's' : '') + ' \u00B7 ' + points + ' pts \u00B7 ' + sym;
    document.getElementById('r-ticksub').textContent =
      '$' + t + ' \u00D7 ' + contracts + ' contract' + (contracts > 1 ? 's' : '');
  }

  function buildTable() {
    var t = SYMS[sym].tick;
    document.getElementById('ref-sym').textContent = sym;
    var rows = '';
    for (var i = 0; i < REF_PTS.length; i++) {
      var p = REF_PTS[i];
      rows += '<tr>' +
        '<td class="pts-col">' + p + ' pts</td>' +
        '<td class="dollar-col">' + dollar(t*p)   + '</td>' +
        '<td class="dollar-col">' + dollar(t*p*2)  + '</td>' +
        '<td class="dollar-col">' + dollar(t*p*5)  + '</td>' +
        '</tr>';
    }
    document.getElementById('ref-body').innerHTML = rows;
  }

  function setSymbol(s) {
    sym = s;
    var tabs = document.querySelectorAll('.tab');
    var keys = ['MNQ','MES','MGC'];
    for (var i = 0; i < tabs.length; i++) {
      if (keys[i] === s) tabs[i].classList.add('active');
      else tabs[i].classList.remove('active');
    }
    document.getElementById('card-sym').textContent  = s;
    document.getElementById('card-desc').textContent = SYMS[s].desc;
    document.getElementById('card-tick').innerHTML   = '$' + SYMS[s].tick + '<span>/pt</span>';
    recalc(); buildTable();
  }

  function onSlider(field, val) {
    val = parseFloat(val);
    if (field === 'c') {
      contracts = Math.max(1, Math.round(val));
      document.getElementById('c-input').value = contracts;
    } else {
      points = Math.max(0.25, val);
      document.getElementById('p-input').value = points;
    }
    recalc();
  }

  function onInput(field, val) {
    val = parseFloat(val);
    if (isNaN(val)) return;
    if (field === 'c') {
      contracts = Math.max(1, Math.min(99, Math.round(val)));
      document.getElementById('c-slider').value = Math.min(contracts, 20);
    } else {
      points = Math.max(0.25, val);
      document.getElementById('p-slider').value = Math.min(points, 200);
    }
    recalc();
  }

  function step(field, delta) {
    if (field === 'c') {
      contracts = Math.max(1, Math.min(99, contracts + delta));
      document.getElementById('c-input').value  = contracts;
      document.getElementById('c-slider').value = Math.min(contracts, 20);
    } else {
      points = Math.max(0.25, Math.round((points + delta) * 4) / 4);
      document.getElementById('p-input').value  = points;
      document.getElementById('p-slider').value = Math.min(points, 200);
    }
    recalc();
  }

  recalc();
  buildTable();
</script>

</body>
</html>
