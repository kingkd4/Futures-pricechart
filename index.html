<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Futures P&L Calculator</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #FDF6F9;
    --surface: #FFF0F5;
    --surface2: #FDE8F0;
    --rose: #E8809A;
    --rose-light: #F2A8BC;
    --rose-muted: #FADADF;
    --mauve: #C48BAE;
    --mauve-light: #DDB8D0;
    --mauve-muted: #F5E6F0;
    --blush: #F7C5D5;
    --lavender: #C9ADDB;
    --lav-muted: #EDE3F5;
    --peach: #F5B8A0;
    --ink: #3A2535;
    --ink-soft: #6B4A60;
    --ink-faint: #A889A0;
    --border: #EDDCE6;
    --white: #FFFAFC;
  }

- { box-sizing: border-box; margin: 0; padding: 0; }

body {
background: var(–bg);
font-family: ‘DM Sans’, sans-serif;
color: var(–ink);
min-height: 100vh;
padding: 0 0 60px;
}

/* HEADER */
header {
background: linear-gradient(135deg, #F2B8CC 0%, #D9A8CF 50%, #C4B0DC 100%);
padding: 30px 24px 24px;
text-align: center;
position: relative;
overflow: hidden;
}
header::before {
content: ‘’;
position: absolute;
top: -30px; right: -30px;
width: 110px; height: 110px;
border-radius: 50%;
background: rgba(255,255,255,0.18);
}
header::after {
content: ‘’;
position: absolute;
bottom: -20px; left: -20px;
width: 80px; height: 80px;
border-radius: 50%;
background: rgba(255,255,255,0.12);
}
header h1 {
font-family: ‘Cormorant Garamond’, serif;
font-weight: 300;
font-size: 2rem;
letter-spacing: 0.05em;
color: #fff;
text-shadow: 0 1px 8px rgba(180,100,140,0.25);
position: relative;
}
header p {
font-size: 0.7rem;
letter-spacing: 0.18em;
text-transform: uppercase;
color: rgba(255,255,255,0.78);
margin-top: 5px;
font-weight: 300;
position: relative;
}

/* SYMBOL TABS */
.symbol-tabs {
display: flex;
background: var(–surface);
border-bottom: 1px solid var(–border);
}
.tab-btn {
flex: 1;
padding: 14px 10px 12px;
border: none;
background: transparent;
cursor: pointer;
font-family: ‘Cormorant Garamond’, serif;
font-size: 1.15rem;
font-weight: 400;
color: var(–ink-faint);
border-bottom: 2px solid transparent;
transition: all 0.22s;
position: relative;
top: 1px;
}
.tab-btn.active {
color: var(–ink);
border-bottom-color: var(–rose);
background: var(–bg);
}
.tab-btn .tick-val {
display: block;
font-family: ‘DM Sans’, sans-serif;
font-size: 0.6rem;
letter-spacing: 0.1em;
text-transform: uppercase;
color: var(–ink-faint);
margin-top: 2px;
font-weight: 300;
}
.tab-btn.active .tick-val { color: var(–rose); }

/* MAIN */
main { padding: 20px 18px; }

/* SYMBOL INFO CARD */
.symbol-card {
background: linear-gradient(135deg, var(–mauve) 0%, var(–rose) 100%);
border-radius: 16px;
padding: 18px 20px;
margin-bottom: 20px;
display: flex;
justify-content: space-between;
align-items: center;
box-shadow: 0 4px 20px rgba(196,139,174,0.3);
position: relative;
overflow: hidden;
}
.symbol-card::after {
content: ‘’;
position: absolute;
top: -20px; right: -20px;
width: 80px; height: 80px;
border-radius: 50%;
background: rgba(255,255,255,0.12);
}
.symbol-card .sym-name {
font-family: ‘Cormorant Garamond’, serif;
font-size: 2.1rem;
font-weight: 300;
color: #fff;
letter-spacing: 0.03em;
}
.symbol-card .sym-desc {
font-size: 0.68rem;
color: rgba(255,255,255,0.72);
text-transform: uppercase;
letter-spacing: 0.13em;
margin-top: 3px;
font-weight: 300;
}
.symbol-card .tick-badge { text-align: right; position: relative; }
.symbol-card .tick-label {
font-size: 0.62rem;
text-transform: uppercase;
letter-spacing: 0.12em;
color: rgba(255,255,255,0.6);
}
.symbol-card .tick-num {
font-family: ‘Cormorant Garamond’, serif;
font-size: 1.65rem;
font-weight: 300;
color: #fff;
letter-spacing: 0.02em;
}

/* INPUTS */
.input-group { margin-bottom: 18px; }
.input-label {
font-size: 0.67rem;
text-transform: uppercase;
letter-spacing: 0.15em;
color: var(–ink-faint);
margin-bottom: 7px;
display: block;
font-weight: 400;
}
.slider-row {
display: flex;
align-items: center;
gap: 12px;
}
.slider-row input[type=range] {
flex: 1;
-webkit-appearance: none;
height: 4px;
background: linear-gradient(90deg, var(–rose-muted), var(–mauve-muted));
border-radius: 4px;
outline: none;
}
.slider-row input[type=range]::-webkit-slider-thumb {
-webkit-appearance: none;
width: 20px;
height: 20px;
border-radius: 50%;
background: linear-gradient(135deg, var(–rose-light), var(–mauve));
cursor: pointer;
box-shadow: 0 2px 8px rgba(196,139,174,0.4);
border: 2px solid #fff;
}
.number-input {
width: 72px;
border: 1.5px solid var(–border);
border-radius: 10px;
background: var(–white);
padding: 8px 10px;
font-family: ‘Cormorant Garamond’, serif;
font-size: 1.15rem;
color: var(–ink);
text-align: center;
outline: none;
transition: border-color 0.2s, box-shadow 0.2s;
}
.number-input:focus {
border-color: var(–rose-light);
box-shadow: 0 0 0 3px var(–rose-muted);
}

/* RESULT CARDS */
.results-grid {
display: grid;
grid-template-columns: 1fr 1fr;
gap: 10px;
margin-top: 20px;
}
.result-card {
background: var(–white);
border: 1.5px solid var(–border);
border-radius: 12px;
padding: 14px 16px;
transition: transform 0.15s;
}
.result-card:active { transform: scale(0.97); }
.result-card.highlight {
background: linear-gradient(135deg, #F2A8BC 0%, #D9A0CF 60%, #C4B0DC 100%);
border-color: transparent;
grid-column: 1 / -1;
box-shadow: 0 4px 18px rgba(196,139,174,0.35);
}
.result-card .rc-label {
font-size: 0.62rem;
text-transform: uppercase;
letter-spacing: 0.13em;
color: var(–ink-faint);
font-weight: 400;
}
.result-card.highlight .rc-label { color: rgba(255,255,255,0.7); }
.result-card .rc-value {
font-family: ‘Cormorant Garamond’, serif;
font-size: 1.9rem;
font-weight: 300;
color: var(–ink);
margin-top: 3px;
letter-spacing: 0.01em;
}
.result-card.highlight .rc-value {
font-size: 2.5rem;
color: #fff;
}
.result-card .rc-sub {
font-size: 0.63rem;
color: var(–ink-faint);
margin-top: 3px;
}
.result-card.highlight .rc-sub { color: rgba(255,255,255,0.65); }

/* DIVIDER */
.divider {
height: 1px;
background: linear-gradient(90deg, transparent, var(–border), transparent);
margin: 24px 0;
}

/* QUICK REFERENCE TABLE */
.ref-section { margin-top: 4px; }
.ref-title {
font-family: ‘Cormorant Garamond’, serif;
font-size: 1.05rem;
font-weight: 400;
font-style: italic;
letter-spacing: 0.06em;
color: var(–ink-soft);
margin-bottom: 10px;
padding-bottom: 7px;
border-bottom: 1px solid var(–border);
}
.ref-table {
width: 100%;
border-collapse: collapse;
border-radius: 10px;
overflow: hidden;
}
.ref-table th {
font-size: 0.6rem;
text-transform: uppercase;
letter-spacing: 0.12em;
color: var(–ink-faint);
font-weight: 400;
padding: 7px 10px;
text-align: left;
background: var(–surface);
border: 1px solid var(–border);
}
.ref-table td {
padding: 9px 10px;
font-size: 0.85rem;
border: 1px solid var(–border);
}
.ref-table tr:nth-child(even) td { background: var(–surface); }
.ref-table tr:nth-child(odd) td { background: var(–white); }
.ref-table .pts-col {
color: var(–ink-faint);
font-size: 0.8rem;
}
.ref-table .dollar-col {
font-family: ‘Cormorant Garamond’, serif;
font-size: 1rem;
font-weight: 400;
color: var(–mauve);
}
</style>

</head>
<body>

<header>
  <h1>Futures P&L</h1>
  <p>Points · Contracts · Dollars</p>
</header>

<div class="symbol-tabs">
  <button class="tab-btn active" onclick="setSymbol('MNQ')">
    MNQ <span class="tick-val">$2 / pt</span>
  </button>
  <button class="tab-btn" onclick="setSymbol('MES')">
    MES <span class="tick-val">$5 / pt</span>
  </button>
  <button class="tab-btn" onclick="setSymbol('MGC')">
    MGC <span class="tick-val">$10 / pt</span>
  </button>
</div>

<main>

  <div class="symbol-card">
    <div>
      <div class="sym-name" id="card-symbol">MNQ</div>
      <div class="sym-desc" id="card-desc">Micro Nasdaq-100</div>
    </div>
    <div class="tick-badge">
      <div class="tick-label">Tick Value</div>
      <div class="tick-num" id="card-tick">$2<span style="font-size:1rem">/pt</span></div>
    </div>
  </div>

  <div class="input-group">
    <label class="input-label">Contracts</label>
    <div class="slider-row">
      <input type="range" id="contracts-slider" min="1" max="20" value="1" oninput="syncInput('contracts', this.value)">
      <input type="number" class="number-input" id="contracts-input" min="1" max="99" value="1" oninput="syncSlider('contracts', this.value)">
    </div>
  </div>

  <div class="input-group">
    <label class="input-label">Points</label>
    <div class="slider-row">
      <input type="range" id="points-slider" min="1" max="200" value="15" oninput="syncInput('points', this.value)">
      <input type="number" class="number-input" id="points-input" min="0.25" max="9999" step="0.25" value="15" oninput="syncSlider('points', this.value)">
    </div>
  </div>

  <div class="results-grid">
    <div class="result-card highlight">
      <div class="rc-label">Total P&L</div>
      <div class="rc-value" id="result-dollar">$30.00</div>
      <div class="rc-sub" id="result-sub">1 contract · 15 pts · MNQ</div>
    </div>
    <div class="result-card">
      <div class="rc-label">Per Contract</div>
      <div class="rc-value" id="result-per-contract">$30.00</div>
      <div class="rc-sub">single contract value</div>
    </div>
    <div class="result-card">
      <div class="rc-label">Per Point</div>
      <div class="rc-value" id="result-per-point">$2.00</div>
      <div class="rc-sub" id="result-tick-sub">tick × contracts</div>
    </div>
  </div>

  <div class="divider"></div>

  <div class="ref-section">
    <div class="ref-title">Quick Reference — <span id="ref-sym-label">MNQ</span></div>
    <table class="ref-table">
      <thead>
        <tr>
          <th>Points</th>
          <th>1 Contract</th>
          <th>2 Contracts</th>
          <th>5 Contracts</th>
        </tr>
      </thead>
      <tbody id="ref-tbody"></tbody>
    </table>
  </div>

</main>

<script>
  const SYMBOLS = {
    MNQ: { name: 'MNQ', desc: 'Micro Nasdaq-100',    tickValue: 2  },
    MES: { name: 'MES', desc: 'Micro E-mini S&P 500', tickValue: 5  },
    MGC: { name: 'MGC', desc: 'Micro Gold',           tickValue: 10 },
  };

  const REF_POINTS = [5, 10, 15, 20, 25, 30, 50, 100];
  let currentSymbol = 'MNQ';
  let contracts = 1;
  let points = 15;

  function setSymbol(sym) {
    currentSymbol = sym;
    document.querySelectorAll('.tab-btn').forEach((b, i) => {
      b.classList.toggle('active', ['MNQ','MES','MGC'][i] === sym);
    });
    const s = SYMBOLS[sym];
    document.getElementById('card-symbol').textContent = s.name;
    document.getElementById('card-desc').textContent = s.desc;
    document.getElementById('card-tick').innerHTML = `$${s.tickValue}<span style="font-size:1rem">/pt</span>`;
    recalc();
    buildRefTable();
  }

  function syncInput(field, val) {
    document.getElementById(`${field}-input`).value = val;
    if (field === 'contracts') contracts = parseInt(val) || 1;
    if (field === 'points') points = parseFloat(val) || 0;
    recalc();
  }

  function syncSlider(field, val) {
    const max = field === 'contracts' ? 20 : 200;
    document.getElementById(`${field}-slider`).value = Math.min(parseFloat(val) || 0, max);
    if (field === 'contracts') contracts = parseInt(val) || 1;
    if (field === 'points') points = parseFloat(val) || 0;
    recalc();
  }

  function fmt(n) {
    return '$' + Math.abs(n).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }

  function recalc() {
    const tick = SYMBOLS[currentSymbol].tickValue;
    document.getElementById('result-dollar').textContent = fmt(tick * points * contracts);
    document.getElementById('result-per-contract').textContent = fmt(tick * points);
    document.getElementById('result-per-point').textContent = fmt(tick * contracts);
    document.getElementById('result-sub').textContent =
      `${contracts} contract${contracts > 1 ? 's' : ''} · ${points} pts · ${currentSymbol}`;
    document.getElementById('result-tick-sub').textContent =
      `$${tick} × ${contracts} contract${contracts > 1 ? 's' : ''}`;
  }

  function buildRefTable() {
    const tick = SYMBOLS[currentSymbol].tickValue;
    document.getElementById('ref-sym-label').textContent = currentSymbol;
    document.getElementById('ref-tbody').innerHTML = REF_POINTS.map(p => `
      <tr>
        <td class="pts-col">${p} pts</td>
        <td class="dollar-col">${fmt(tick * p)}</td>
        <td class="dollar-col">${fmt(tick * p * 2)}</td>
        <td class="dollar-col">${fmt(tick * p * 5)}</td>
      </tr>
    `).join('');
  }

  recalc();
  buildRefTable();
</script>

</body>
</html>
